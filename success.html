<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | QuickBite</title>
    <link rel="stylesheet" href="menu.css">
</head>
<body>
    <div class="menu-bg"></div>
    <div class="success-card" style="background: white; width: 90%; max-width: 400px; padding: 40px; border-radius: 25px; text-align: center; margin: 100px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
        <h1 style="color: #27ae60; font-size: 4rem;">✓</h1>
        <h2>Order Confirmed!</h2>
        <p>Show this at the counter to collect your food.</p>

        <div style="background: #f1fcf4; border: 2px dashed #27ae60; padding: 20px; border-radius: 15px; margin: 20px 0;">
            <span style="font-size: 12px; color: #636e72;">YOUR TOKEN / TABLE</span>
            <span style="font-size: 3rem; font-weight: bold; color: #27ae60; display: block;" id="display-token">--</span>
        </div>

        <a href="menu.html" style="text-decoration: none; display: block; background: #d63031; color: white; padding: 15px; border-radius: 12px; font-weight: bold;">Back to Menu</a>
    </div>

    <script>
        window.onload = function() {
            // Get order details
            const token = localStorage.getItem('customToken') || "N/A";
            const total = localStorage.getItem('totalPrice') || "0";
            const method = localStorage.getItem('payMethod') || "online";
            const cart = JSON.parse(localStorage.getItem('canteenCart')) || [];
            
            // Display token
            document.getElementById('display-token').innerText = token;
            
            // Create order for admin
            const newOrder = {
                token: token,
                amount: total,
                method: method,
                items: cart,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                status: "Pending"
            };
            
            // Save to all orders
            let allOrders = JSON.parse(localStorage.getItem('allOrders')) || [];
            allOrders.push(newOrder);
            localStorage.setItem('allOrders', JSON.stringify(allOrders));
            
            // Clear cart for next order
            localStorage.removeItem('canteenCart');
            localStorage.removeItem('totalPrice');
            localStorage.removeItem('customToken');
            localStorage.removeItem('payMethod');
        };
    </script>
</body>
</html>
