<!DOCTYPE html>
<html>
<head>
    <title>Clear Orders</title>
</head>
<body>
    <h1>Clear Orders</h1>
    <button onclick="clearOrders()">Clear All Orders</button>
    <div id="result"></div>

    <script>
        function clearOrders() {
            document.getElementById('result').innerHTML = 'Processing...';
            
            fetch('https://quickbite-backend-z577.onrender.com/clear-all-orders', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('result').innerHTML = 
                    `<pre style="color: green;">✅ Success: ${JSON.stringify(data, null, 2)}</pre>`;
            })
            .catch(err => {
                document.getElementById('result').innerHTML = 
                    `<pre style="color: red;">❌ Error: ${err.message}</pre>`;
            });
        }
    </script>
</body>
</html>
