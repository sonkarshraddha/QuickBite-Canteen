<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickBite | My Orders</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f05656 0%, #ec3b3b 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* reuse sidebar & overlay from main (or slight variant) */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            top: 0;
            left: 0;
            background: linear-gradient(135deg, #2d3436 0%, #1e272e 100%);
            box-shadow: 2px 0 30px rgba(0,0,0,0.5);
            overflow-x: hidden;
            transition: 0.3s ease-in-out;
            z-index: 9998;
            padding-top: 70px;
            color: white;
            border-top-right-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .sidebar.open {
            width: 320px;
        }

        .sidebar-content {
            padding: 20px;
            opacity: 0;
            transition: opacity 0.2s 0.1s;
        }

        .sidebar.open .sidebar-content {
            opacity: 1;
        }

        .user-profile {
            text-align: center;
            padding: 25px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .user-avatar {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #ff7675, #d63031);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            color: white;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .user-profile h3 {
            font-size: 1.6rem;
            margin-bottom: 5px;
            color: white;
        }

        .user-profile p {
            color: #b2bec3;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.3);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
        }

        .sidebar-menu-item {
            padding: 15px 20px;
            margin: 8px 0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
            color: #dfe6e9;
            font-size: 1.1rem;
        }

        .sidebar-menu-item i {
            width: 25px;
            color: #ff7675;
            font-size: 1.2rem;
        }

        .sidebar-menu-item:hover {
            background: #ff7675;
            color: white;
            transform: translateX(8px);
            box-shadow: 0 5px 15px rgba(255,118,117,0.3);
        }

        .sidebar-menu-item:hover i {
            color: white;
        }

        .sidebar-menu-item.active {
            background: rgba(255,118,117,0.2);
            border-left: 4px solid #ff7675;
        }

        .logout-section {
            margin-top: 40px;
            border-top: 2px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }

        .logout-btn {
            background: rgba(214, 48, 49, 0.2);
            border-radius: 12px;
        }

        .logout-btn:hover {
            background: #d63031 !important;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(3px);
            z-index: 9997;
            display: none;
            transition: 0.3s;
        }

        .overlay.show {
            display: block;
        }

        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 55px;
            height: 55px;
            background: #d63031;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            z-index: 9999;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: all 0.3s;
            border: 2px solid white;
        }

        .menu-btn:hover {
            background: #ff7675;
            transform: scale(1.05) rotate(180deg);
        }

        .menu-btn span {
            width: 30px;
            height: 4px;
            background: white;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #ff7675;
            z-index: 9999;
        }

        .close-btn:hover {
            background: #d63031;
            transform: rotate(90deg);
        }

        /* header for orders page */
        .orders-header {
            text-align: center;
            color: white;
            padding: 30px 20px 10px;
        }

        .orders-header h1 {
            font-size: 2.8rem;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .orders-header p {
            font-size: 1.2rem;
            background: rgba(0,0,0,0.1);
            padding: 8px 20px;
            border-radius: 40px;
            display: inline-block;
            backdrop-filter: blur(5px);
        }

        .content-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 30px 40px;
            transition: margin-left 0.3s;
        }

        /* filter tabs */
        .filter-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 30px 0 20px;
        }

        .filter-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            backdrop-filter: blur(6px);
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .filter-btn i {
            margin-right: 8px;
        }

        .filter-btn.active {
            background: white;
            color: #d63031;
            border-color: #d63031;
        }

        .filter-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: translateY(-3px);
        }

        /* orders grid / cards */
        .orders-grid {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-top: 20px;
        }

        .order-card {
            background: white;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
            animation: slideUp 0.4s ease-out;
        }

        .order-card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 30px 55px rgba(0,0,0,0.3);
            border-color: #ff7675;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .order-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 2px dashed #eee;
        }

        .order-id {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(145deg, #2d3436, #636e72);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .order-status {
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .status-delivered { background: #2ecc71; color: white; }
        .status-cancelled { background: #e74c3c; color: white; }
        .status-processing { background: #f39c12; color: white; }

        .order-time {
            color: #7f8c8d;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .order-items {
            padding: 20px 0;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f1f1f1;
        }

        .item-name {
            font-weight: 600;
            color: #2c3e50;
        }

        .item-qty {
            color: #e67e22;
            font-weight: 500;
        }

        .item-price {
            font-weight: 700;
            color: #2d3436;
        }

        .order-footer {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 2px solid #f0f0f0;
        }

        .total-amount {
            font-size: 1.5rem;
            font-weight: 800;
            color: #d63031;
            background: #fef0f0;
            padding: 8px 22px;
            border-radius: 40px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.03);
        }

        .order-actions {
            display: flex;
            gap: 12px;
        }

        .reorder-btn, .rate-btn {
            border: none;
            padding: 12px 22px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .reorder-btn {
            background: #d63031;
            color: white;
            box-shadow: 0 7px 15px rgba(214,48,49,0.3);
        }

        .reorder-btn:hover {
            background: #ff7675;
            transform: scale(1.05) rotate(-1deg);
        }

        .rate-btn {
            background: #ecf0f1;
            color: #2c3e50;
            border: 1px solid #bdc3c7;
        }

        .rate-btn:hover {
            background: #bdc3c7;
            transform: scale(1.02);
        }

        .empty-state {
            text-align: center;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 60px 30px;
            border-radius: 50px;
            color: white;
            margin-top: 30px;
        }

        .empty-state i {
            font-size: 5rem;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .empty-state h2 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 1.3rem;
            margin-bottom: 30px;
        }

        .shop-now-btn {
            background: white;
            color: #d63031;
            border: none;
            padding: 15px 40px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .shop-now-btn:hover {
            background: #ff7675;
            color: white;
            transform: translateY(-5px);
        }

        /* quick rating modal simulation (inline) */
        .rating-inline {
            background: #fff8e7;
            border-radius: 40px;
            padding: 5px 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .star {
            color: #f1c40f;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .star:hover {
            transform: scale(1.3);
            color: #f39c12;
        }

        .rated-msg {
            color: #27ae60;
            font-weight: 500;
            margin-left: 10px;
        }

        /* responsiveness */
        @media (max-width: 700px) {
            .sidebar.open { width: 280px; }
            .order-header { flex-direction: column; align-items: start; gap: 10px; }
            .order-footer { flex-direction: column; align-items: start; gap: 15px; }
            .total-amount { align-self: flex-start; }
        }

        /* small badge */
        .payment-mode {
            background: #34495e;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .order-id-small {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <!-- sidebar (same as menu for consistency) -->
    <div class="sidebar" id="sidebar">
        <div class="close-btn" onclick="toggleSidebar()">×</div>
        <div class="sidebar-content">
            <div class="user-profile">
                <div class="user-avatar">👨‍🎓</div>
                <h3>Hello, User!</h3>
                <p>Computer Science • 3rd Year</p>
                <div class="timing-badge" style="background:#ff7675; color:white; padding:8px 15px; border-radius:25px; font-size:0.9rem; display:inline-flex; gap:8px; margin-top:10px;">
                    <i class="fas fa-clock"></i> Canteen Open: 11 AM - 4 PM
                </div>
            </div>

            <div class="sidebar-menu-item" onclick="window.location.href='menu.html'">
                <i class="fas fa-home"></i> Menu
            </div>
            <div class="sidebar-menu-item active" onclick="showActiveOrders()">
                <i class="fas fa-history"></i> Previous Orders
            </div>
            <div class="sidebar-menu-item" onclick="showCombos()">
                <i class="fas fa-utensils"></i> Student Combos
            </div>
            <div class="sidebar-menu-item" onclick="showFavorites()">
                <i class="fas fa-heart"></i> My Favorites
            </div>
            <div class="sidebar-menu-item" onclick="showFeedback()">
                <i class="fas fa-star"></i> Rate Us
            </div>

            <div class="logout-section">
                <div class="sidebar-menu-item logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Log Out
                </div>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="menu-btn" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
    </div>

    <div class="content-wrapper">
        <div class="orders-header">
            <h1>🍽️ My Orders</h1>
            <p>Your canteen history at a glance</p>
        </div>

        <!-- filter chips -->
        <div class="filter-tabs">
            <button class="filter-btn active" onclick="filterOrders('all')"><i class="fas fa-list-ul"></i> All</button>
            <button class="filter-btn" onclick="filterOrders('delivered')"><i class="fas fa-check-circle"></i> Delivered</button>
            <button class="filter-btn" onclick="filterOrders('processing')"><i class="fas fa-spinner"></i> Processing</button>
            <button class="filter-btn" onclick="filterOrders('cancelled')"><i class="fas fa-times-circle"></i> Cancelled</button>
        </div>

        <!-- orders container -->
        <div id="ordersContainer" class="orders-grid"></div>

        <!-- hidden empty state template (will clone) -->
        <template id="emptyTemplate">
            <div class="empty-state">
                <i class="fas fa-receipt"></i>
                <h2>No orders yet!</h2>
                <p>Hungry? Grab something delicious from the canteen.</p>
                <button class="shop-now-btn" onclick="goToMenu()"><i class="fas fa-pizza-slice"></i> Browse Menu</button>
            </div>
        </template>
    </div>

    <!-- quick interactive script for orders page -->
    <script>
        // ---------- sample order data (interactive & rich) ----------
        const ordersData = [
            {
                id: '#QBT-241015',
                date: '15 Oct 2024, 1:30 PM',
                status: 'delivered',
                items: [
                    { name: 'Veg Biryani', qty: 1, price: 65 },
                    { name: 'Cold Coffee', qty: 1, price: 40 },
                    { name: 'Samosa (2 pcs)', qty: 2, price: 40 }
                ],
                total: 145,
                payment: 'UPI',
                rated: true
            },
            {
                id: '#QBT-241012',
                date: '12 Oct 2024, 11:20 AM',
                status: 'delivered',
                items: [
                    { name: 'Pav Bhaji', qty: 1, price: 60 },
                    { name: 'Masala Chai', qty: 2, price: 20 },
                    { name: 'French Fries', qty: 1, price: 45 }
                ],
                total: 125,
                payment: 'Cash',
                rated: false
            },
            {
                id: '#QBT-241008',
                date: '8 Oct 2024, 3:45 PM',
                status: 'processing',
                items: [
                    { name: 'North Indian Thali', qty: 1, price: 80 },
                    { name: 'Buttermilk', qty: 1, price: 25 },
                    { name: 'Veg Cutlet', qty: 1, price: 35 }
                ],
                total: 140,
                payment: 'Card',
                rated: false
            },
            {
                id: '#QBT-241005',
                date: '5 Oct 2024, 12:10 PM',
                status: 'cancelled',
                items: [
                    { name: 'Chole Bhature', qty: 1, price: 60 },
                    { name: 'Sweet Lassi', qty: 1, price: 35 }
                ],
                total: 95,
                payment: 'UPI',
                rated: false,
                cancelReason: 'Out of stock'
            },
            {
                id: '#QBT-241001',
                date: '1 Oct 2024, 9:50 AM',
                status: 'delivered',
                items: [
                    { name: 'Aloo Paratha', qty: 1, price: 45 },
                    { name: 'Veg Sandwich', qty: 1, price: 35 },
                    { name: 'Filter Coffee', qty: 1, price: 15 }
                ],
                total: 95,
                payment: 'Cash',
                rated: true
            }
        ];

        // render orders based on filter
        function renderOrders(filter = 'all') {
            const container = document.getElementById('ordersContainer');
            const filtered = filter === 'all' ? ordersData : ordersData.filter(o => o.status === filter);

            if (!filtered.length) {
                // show empty state
                const template = document.getElementById('emptyTemplate').content.cloneNode(true);
                container.innerHTML = '';
                container.appendChild(template);
                return;
            }

            let htmlStr = '';
            filtered.forEach(order => {
                const statusClass = 
                    order.status === 'delivered' ? 'status-delivered' : 
                    order.status === 'processing' ? 'status-processing' : 'status-cancelled';

                const statusIcon = 
                    order.status === 'delivered' ? '<i class="fas fa-check-circle"></i>' :
                    order.status === 'processing' ? '<i class="fas fa-sync-alt fa-spin"></i>' : '<i class="fas fa-ban"></i>';

                // build items rows
                let itemsRows = '';
                order.items.forEach(item => {
                    itemsRows += `
                        <div class="item-row">
                            <span class="item-name">${item.name}</span>
                            <span class="item-qty">x${item.qty}</span>
                            <span class="item-price">₹${item.price * item.qty}</span>
                        </div>
                    `;
                });

                // rating stars only if delivered and not rated yet
                let ratingHtml = '';
                if (order.status === 'delivered' && !order.rated) {
                    ratingHtml = `
                        <div class="rating-inline" id="rating-${order.id}">
                            <span class="star" onclick="rateOrder('${order.id}', 1)">★</span>
                            <span class="star" onclick="rateOrder('${order.id}', 2)">★</span>
                            <span class="star" onclick="rateOrder('${order.id}', 3)">★</span>
                            <span class="star" onclick="rateOrder('${order.id}', 4)">★</span>
                            <span class="star" onclick="rateOrder('${order.id}', 5)">★</span>
                            <span class="rated-msg" style="display:none;">✓ Rated</span>
                        </div>
                    `;
                } else if (order.status === 'delivered' && order.rated) {
                    ratingHtml = `<span class="rated-msg"><i class="fas fa-check-circle" style="color:#27ae60;"></i> Rated</span>`;
                } else {
                    ratingHtml = `<span class="payment-mode">${order.payment}</span>`;
                }

                htmlStr += `
                    <div class="order-card" data-status="${order.status}">
                        <div class="order-header">
                            <div class="order-id-small">
                                <span class="order-id">${order.id}</span>
                                <span class="payment-mode"><i class="fas fa-${order.payment === 'UPI' ? 'mobile-alt' : (order.payment === 'Cash' ? 'money-bill-wave' : 'credit-card')}"></i> ${order.payment}</span>
                            </div>
                            <div class="order-status ${statusClass}">
                                ${statusIcon} ${order.status.charAt(0).toUpperCase() + order.status.slice(1)}
                            </div>
                        </div>
                        <div class="order-time"><i class="far fa-clock"></i> ${order.date}</div>
                        <div class="order-items">
                            ${itemsRows}
                        </div>
                        <div class="order-footer">
                            <div class="total-amount">₹${order.total}</div>
                            <div class="order-actions">
                                ${ratingHtml}
                                <button class="reorder-btn" onclick="reorderItems('${order.id}')"><i class="fas fa-redo-alt"></i> Reorder</button>
                            </div>
                        </div>
                        ${order.cancelReason ? `<div style="margin-top:12px; background:#ffe5e5; padding:8px 15px; border-radius:30px; color:#c0392b;"><i class="fas fa-info-circle"></i> Reason: ${order.cancelReason}</div>` : ''}
                    </div>
                `;
            });

            container.innerHTML = htmlStr;
        }

        // filter function
        function filterOrders(type) {
            // update active button
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderOrders(type);
        }

        // rating simulation (just UI update)
        function rateOrder(orderId, stars) {
            alert(`Thanks! You rated order ${orderId} with ${stars} ★`);
            const ratingDiv = document.getElementById(`rating-${orderId}`);
            if (ratingDiv) {
                ratingDiv.innerHTML = `<span class="rated-msg"><i class="fas fa-check-circle" style="color:#27ae60;"></i> Rated ${stars}★</span>`;
            }
            // In real app, you'd update backend. We'll also mark rated in our local array (optional)
            const order = ordersData.find(o => o.id === orderId);
            if (order) order.rated = true;
        }

        // reorder : combine with main cart concept (simulate navigation)
        function reorderItems(orderId) {
            const order = ordersData.find(o => o.id === orderId);
            if (!order) return;
            // build a summary message (in real app would prepopulate cart)
            let itemList = order.items.map(i => `${i.name} x${i.qty}`).join(', ');
            alert(`🛒 Reorder: ${itemList} (total ₹${order.total}) added to cart.\n(Redirect to menu in real app)`);
            // goToMenu() maybe
        }

        // sidebar & misc
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function goToMenu() {
            window.location.href = 'menu.html'; // assuming menu.html exists
        }

        function showActiveOrders() { filterOrders('all'); }
        function showCombos() { alert('🍱 Student Combos: Maggi+Chai ₹45, Samosa(2)+Chai ₹35'); toggleSidebar(); }
        function showFavorites() { alert('❤️ Your liked items: Veg Biryani, Pav Bhaji, Cold Coffee'); toggleSidebar(); }
