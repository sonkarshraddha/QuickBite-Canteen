<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickBite | Previous Orders</title>
    <link rel="stylesheet" href="previous-orders.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="orders-container">
        <div class="header">
            <h1><i class="fas fa-history"></i> Your Orders</h1>
            <div class="status-filters">
                <button class="filter-btn active" onclick="filterOrders('all')">All</button>
                <button class="filter-btn" onclick="filterOrders('Processing')">Processing</button>
                <button class="filter-btn" onclick="filterOrders('Completed')">Completed</button>
            </div>
        </div>
        
        <div id="orders-list" class="orders-list">
            <!-- Orders will be populated here -->
        </div>
        
        <div class="actions">
            <a href="menu.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Menu</a>
            <button class="refresh-btn" onclick="loadPreviousOrders()"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>
    </div>

    <script src="previous-orders.js"></script>
</body>
</html>
