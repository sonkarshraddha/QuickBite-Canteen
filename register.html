<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteen Registration</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>

    <div class="full-screen-bg">
        <div class="register-popup">
            
            <div id="register-area">
                <div class="icon">🍱</div>
                <h2>Join Canteen</h2>
                <p class="college-note">Register to start ordering your favorite meals</p>
                
                <form id="registration-form">
                    <input type="text" id="full-name" placeholder="Full Name" required>
                    <input type="text" id="roll-no" placeholder="College Roll Number" required>
                    <input type="email" id="college-email" placeholder="College Email" required>
                    <input type="password" id="password" placeholder="Create Password" required>
                    
                    <button type="submit" id="submit-btn">
                        <span id="btn-text">Register Now</span>
                    </button>
                </form>

                <p class="college-note">
                    Already have an account? <a href="q_index.html">Login here</a>
                </p>
            </div>

            <div id="success-state" class="hidden">
                <div class="icon">✅</div>
                <h2>Registered!</h2>
                <p>Welcome! Redirecting to login...</p>
            </div>

        </div>
    </div>

    <script src="register.js"></script>
</body>
</html>
