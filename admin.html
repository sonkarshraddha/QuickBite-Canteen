<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickBite | Admin Panel</title>  
    <link rel="stylesheet" href="menu-style.css">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        
        /* Hide the dashboard by default until authorized */
        #admin-content { display: none; width: 100%; max-width: 1000px; z-index: 10; }

        .admin-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #fff5f5;
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid #d63031;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #d63031; text-transform: uppercase; font-size: 12px; }

        .ready-btn {
            background: #27ae60; color: white; border: none;
            padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        .method-tag {
            padding: 4px 8px; border-radius: 5px; font-size: 12px; font-weight: bold;
        }
        .upi { background: #e3f2fd; color: #1976d2; }
        .cash { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>
    <div class="menu-bg"></div>

    <div id="admin-content">
        <div class="admin-box">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h1>Canteen Dashboard 🛎️</h1>
                <button onclick="logout()" style="background:#636e72; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;">Logout</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <small>Total Orders</small>
                    <h2 id="stat-count">0</h2>
                </div>
                <div class="stat-card">
                    <small>Total Revenue</small>
                    <h2 id="stat-revenue">₹0</h2>
                </div>
            </div>
        </div>

        <div class="admin-box">
            <h3>🔥 Live Orders (Kitchen)</h3>
            <table>
                <thead>
                    <tr>
                        <th>Token</th>
                        <th>Items</th>
                        <th>Time</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="active-orders"></tbody>
            </table>
        </div>

        <div class="admin-box">
            <h3>💰 Payment History</h3>
            <table>
                <thead>
                    <tr>
                        <th>Token</th>
                        <th>Amount</th>
                        <th>Method</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="payment-logs"></tbody>
            </table>
        </div>
    </div>

    <script>
        // --- 1. ACCESS CONTROL ---
        function checkAccess() {
            const auth = sessionStorage.getItem('adminAuth');
            if (auth === 'true') {
                document.getElementById('admin-content').style.display = 'block';
                loadData();
            } else {
                const pass = prompt("Enter Admin Password:");
                if (pass === "admin123") {
                    sessionStorage.setItem('adminAuth', 'true');
                    document.getElementById('admin-content').style.display = 'block';
                    loadData();
                } else {
                    alert("Unauthorized!");
                    window.location.href = "menu.html";
                }
            }
        }

        // --- 2. DATA HANDLING ---
        function loadData() {
            const orders = JSON.parse(localStorage.getItem('allOrders')) || [];
            const activeTable = document.getElementById('active-orders');
            const paymentTable = document.getElementById('payment-logs');
            
            let revenue = 0;
            activeTable.innerHTML = "";
            paymentTable.innerHTML = "";

            orders.forEach((order, index) => {
                revenue += parseFloat(order.amount);

                // Populate Active Orders (if not completed)
                if (order.status !== "Completed") {
                    const itemsText = order.items.map(i => i.name).join(", ");
                    activeTable.innerHTML += `
                        <tr>
                            <td><b>#${order.token}</b></td>
                            <td>${itemsText}</td>
                            <td>${order.time}</td>
                            <td><button class="ready-btn" onclick="markReady(${index})">Ready ✔</button></td>
                        </tr>
                    `;
                }

                // Populate Payment Logs
                paymentTable.innerHTML += `
                    <tr>
                        <td>#${order.token}</td>
                        <td>₹${order.amount}</td>
                        <td><span class="method-tag ${order.method === 'online' ? 'upi' : 'cash'}">
                            ${order.method === 'online' ? '📱 UPI' : '💵 CASH'}
                        </span></td>
                        <td>${order.time}</td>
                    </tr>
                `;
            });

            document.getElementById('stat-count').innerText = orders.length;
            document.getElementById('stat-revenue').innerText = "₹" + revenue;
        }

        function markReady(index) {
            let orders = JSON.parse(localStorage.getItem('allOrders'));
            orders[index].status = "Completed";
            localStorage.setItem('allOrders', JSON.stringify(orders));
            loadData();
        }

        function logout() {
            sessionStorage.removeItem('adminAuth');
            window.location.reload();
        }

        // Run security on load
        checkAccess();
        // Refresh every 5 seconds
        setInterval(loadData, 5000);

function loadData() {
    // Look for the EXACT same key: 'allOrders'
    const orders = JSON.parse(localStorage.getItem('allOrders')) || [];
    const activeTable = document.getElementById('active-orders');
    const paymentTable = document.getElementById('payment-logs');
    
    let revenue = 0;
    let activeCount = 0;
    
    activeTable.innerHTML = "";
    paymentTable.innerHTML = "";

    orders.forEach((order, index) => {
        revenue += parseFloat(order.amount);

        // Populate Kitchen Table (Live Orders)
        if (order.status !== "Completed") {
            activeCount++;
            const itemsText = order.items.map(i => i.name).join(", ");
            activeTable.innerHTML += `
                <tr>
                    <td><b>#${order.token}</b></td>
                    <td>${itemsText}</td>
                    <td>${order.time}</td>
                    <td><button class="ready-btn" onclick="markReady(${index})">Ready ✔</button></td>
                </tr>
            `;
        }

        // Populate Payment Logs Table
        paymentTable.innerHTML += `
            <tr>
                <td>#${order.token}</td>
                <td>₹${order.amount}</td>
                <td><span class="method-tag ${order.method === 'online' ? 'upi' : 'cash'}">
                    ${order.method === 'online' ? '📱 UPI' : '💵 CASH'}
                </span></td>
                <td>${order.time}</td>
            </tr>
        `;
    });

    document.getElementById('stat-count').innerText = activeCount;
    document.getElementById('stat-revenue').innerText = "₹" + revenue;
}


function resetDay() {
    if(confirm("Delete all order history for today?")) {
        localStorage.removeItem('allOrders');
        location.reload(); // Refresh to show 0
    }
}
    </script>
</body>
</html>
