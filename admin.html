<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickBite | Admin Panel</title>  
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="login-container">
        <div class="login-box">
            <i class="fas fa-utensils" style="font-size: 3rem; color: #d63031; margin-bottom: 20px;"></i>
            <h2>Admin Login</h2>
            <input type="password" id="password-input" placeholder="Enter admin password" onkeypress="handleKeyPress(event)">
            <button onclick="checkPassword()">Login</button>
        </div>
    </div>

    <div id="admin-content">
        <div class="admin-box">
            <div class="header-actions">
                <h1><i class="fas fa-chart-line" style="color: #d63031; margin-right: 10px;"></i>Canteen Dashboard 🛎️</h1>
                <div>
                    <button class="reset-btn" onclick="resetDay()"><i class="fas fa-trash"></i> Reset Day</button>
                    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-clock" style="color: #d63031;"></i>
                    <small>Processing Orders</small>
                    <h2 id="stat-count">0</h2>
                </div>
                <div class="stat-card">
                    <i class="fas fa-check-circle" style="color: #27ae60;"></i>
                    <small>Ready to Pickup</small>
                    <h2 id="ready-count">0</h2>
                </div>
                <div class="stat-card">
                    <i class="fas fa-rupee-sign" style="color: #d63031;"></i>
                    <small>Today's Revenue</small>
                    <h2 id="stat-revenue">₹0</h2>
                </div>
                <div class="stat-card">
                    <i class="fas fa-shopping-bag" style="color: #d63031;"></i>
                    <small>Total Orders</small>
                    <h2 id="total-orders">0</h2>
                </div>
            </div>
        </div>

        <div class="admin-box">
            <h3><i class="fas fa-fire" style="color: #d63031; margin-right: 10px;"></i>🔥 Kitchen Orders</h3>
            
            <div class="status-tabs">
                <button class="tab-btn active" onclick="filterOrders('all')">All Orders</button>
                <button class="tab-btn" onclick="filterOrders('Processing')">Processing</button>
                <button class="tab-btn" onclick="filterOrders('Ready')">Ready to Pickup</button>
                <button class="tab-btn" onclick="filterOrders('Completed')">Completed</button>
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Token #</th>
                            <th>Items</th>
                            <th>Amount</th>
                            <th>Time</th>
                            <th>Payment</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="active-orders"></tbody>
                </table>
            </div>
        </div>

        <div class="admin-box">
            <h3><i class="fas fa-history" style="color: #d63031; margin-right: 10px;"></i>💰 Payment History</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Token</th>
                            <th>Items</th>
                            <th>Amount</th>
                            <th>Method</th>
                            <th>Time</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="payment-logs"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
