<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickBite | Checkout</title>
    <link rel="stylesheet" href="checkout.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="payment-box">
        <h2><i class="fas fa-credit-card"></i> Checkout</h2>
        
        <!-- Order Summary -->
        <div class="order-summary" id="order-summary">
            <h3><i class="fas fa-shopping-bag"></i> Your Order</h3>
            <div class="order-items" id="order-items-list">
                <!-- Items will be populated by JS -->
            </div>
            <div class="order-total">
                <span>Total Amount:</span>
                <span>₹<span id="pay-total">0</span></span>
            </div>
        </div>
        
        <div class="student-info">
            <label>
                <i class="fas fa-id-card"></i> Enter Token / Table Number:
            </label>
            <input type="text" id="student-token" placeholder="e.g. 101 or Table 5" maxlength="20">
        </div>

        <div class="pay-option" id="online-option" onclick="selectPaymentMethod('online')">
            <div class="pay-option-left">
                <span>📱 Online UPI</span>
                <small>GPay, Paytm, PhonePe, FamPay</small>
            </div>
            <i class="fas fa-chevron-right" style="color: #d63031;"></i>
        </div>

        <div class="pay-option" id="counter-option" onclick="selectPaymentMethod('counter')">
            <div class="pay-option-left">
                <span>💵 Pay at Counter</span>
                <small>Cash or Physical QR</small>
            </div>
            <i class="fas fa-chevron-right" style="color: #d63031;"></i>
        </div>

        <!-- Success Message -->
        <div class="success-message" id="success-message">
            <i class="fas fa-check-circle"></i> Order confirmed! Redirecting...
        </div>

        <button class="confirm-btn" id="main-btn" onclick="confirmOrder()" disabled>
            <i class="fas fa-lock"></i> Confirm & Pay
        </button>
        
        <a href="menu.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Menu
        </a>
    </div>

    <script src="checkout.js"></script>
</body>
</html>
